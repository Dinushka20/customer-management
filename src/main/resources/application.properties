spring.application.name=customer-management
# ============================================================
# Customer Management System - Application Properties
# ============================================================

# Server
server.port=8080

# DataSource - MariaDB
# Change username/password to match your local MariaDB setup
spring.datasource.url=jdbc:mariadb://localhost:3306/customer_db?useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=12345678
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MariaDB103Dialect

# Run schema.sql and data.sql on startup (comment out after first run)
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema.sql
spring.sql.init.data-locations=classpath:data.sql

# Multipart file upload (for bulk Excel upload - allow large files)
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# Jackson - serialize Java 8 dates properly
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.date-format=yyyy-MM-dd